name: Nusoma
options:
  bundleIdPrefix: com.nusoma
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

packages:
  MarkdownView:
    url: https://github.com/LiYanan2004/MarkdownView.git
    branch: main
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  Nusoma:
    type: application
    platform: macOS
    sources:
      - path: Nusoma
    resources:
      - path: Nusoma/Resources
    dependencies:
      - package: MarkdownView
        product: MarkdownView
      - package: WhisperKit
        product: WhisperKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nusoma.app
        PRODUCT_NAME: Nusoma
        INFOPLIST_FILE: Nusoma/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nusoma/Nusoma.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Nusoma/Info.plist
    entitlements:
      path: Nusoma/Nusoma.entitlements

  NusomaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NusomaTests
    dependencies:
      - target: Nusoma
