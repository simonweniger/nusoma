name: Nusoma
options:
  bundleIdPrefix: com.nusoma
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  Nusoma:
    type: application
    platform: macOS
    sources:
      - path: Nusoma
    resources:
      - path: Nusoma/Resources
    dependencies:
      - package: HotKey
      - package: swift-markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nusoma.app
        PRODUCT_NAME: Nusoma
        INFOPLIST_FILE: Nusoma/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nusoma/Nusoma.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Nusoma/Info.plist
    entitlements:
      path: Nusoma/Nusoma.entitlements

  NusomaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NusomaTests
    dependencies:
      - target: Nusoma
